# SEC-15: Configuración mínima necesaria — detalles de implementación en env vars
[functions]
  directory = "netlify/functions"

[functions."*"]
  external_node_modules = ["@anthropic-ai/sdk"]
  timeout = 26

[[edge_functions]]
  function = "chat-stream"
  path = "/api/chat-stream"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # SEC-04 FIX: Eliminado unsafe-eval. unsafe-inline se mantiene temporalmente porque
    # la app usa onclick handlers inline extensivamente — migrar a event listeners requiere
    # refactoring mayor. Se compensa con DOMPurify y esc() en toda salida HTML.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://zgoxrzbkftzulsphmtfk.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://zgoxrzbkftzulsphmtfk.supabase.co https://*.netlify.app https://api.anthropic.com https://www.googleapis.com https://drive.google.com https://api.monday.com; frame-ancestors 'none'"
